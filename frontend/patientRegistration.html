<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Registration Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 md:p-8">

  <div
    class="w-full max-w-xl bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden p-6 md:p-10 space-y-8 relative">

    <div
      class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-1 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500 rounded-full blur-sm">
    </div>

    <header class="text-center space-y-2">
      <div
        class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600/10 text-indigo-400 border border-indigo-500/20 rounded-xl text-xl font-bold mb-2">
        🩺
      </div>
      <h1 id="clinic-title" class="text-2xl font-black tracking-tight text-white">Loading Clinical Portal...</h1>
      <p class="text-xs text-slate-400">Create your secure personal health record account to manage appointments</p>
    </header>

    <div id="status-banner" class="hidden p-3.5 rounded-xl text-xs font-semibold text-center"></div>

    <form id="registration-form" class="space-y-4">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">First Legal
            Name</label>
          <input type="text" id="firstName" required placeholder="Jane"
            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-indigo-500 transition-colors">
        </div>
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Last Legal
            Name</label>
          <input type="text" id="lastName" required placeholder="Doe"
            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-indigo-500 transition-colors">
        </div>
      </div>

      <div>
        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Primary Email
          Address</label>
        <input type="email" id="email" required placeholder="jane.doe@example.com"
          class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-indigo-500 transition-colors">
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Contact Phone
            Number</label>
          <input type="tel" id="phone" required placeholder="(555) 000-0000"
            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-indigo-500 transition-colors">
        </div>
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Date of Birth</label>
          <input type="date" id="dateOfBirth" required
            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-500 transition-colors text-slate-400">
        </div>
      </div>

      <div>
        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Account Password</label>
        <input type="password" id="password" required placeholder="••••••••••••"
          class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-indigo-500 transition-colors">
      </div>

      <button type="submit" id="submit-btn"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs py-3 rounded-xl shadow-lg shadow-indigo-600/10 mt-4 transition-all uppercase tracking-wider">
        Register Account Node
      </button>

    </form>

    <footer class="text-center">
      <p class="text-[10px] text-slate-500">🔒 AES-256 Cloud Infrastructure Secured Portal Connection</p>
    </footer>

  </div>

  <script src="/src/pages/patientRegistrationForm.js"></script>
</body>

</html>
