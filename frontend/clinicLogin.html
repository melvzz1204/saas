<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Workspace Gateway | SaaS Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-8 space-y-6">

        <div class="text-center space-y-2">
            <div class="inline-block bg-indigo-600 p-3 rounded-xl text-white font-black text-2xl shadow-md">🦷</div>
            <h2 class="text-2xl font-bold text-white tracking-tight">Clinic Workspace Control</h2>
            <p class="text-xs text-slate-400">Authorized personnel terminal entry point</p>
        </div>

        <div id="error-box"
            class="hidden bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs p-3.5 rounded-lg font-medium">
        </div>

        <form id="business-login-form" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Workspace
                    Email</label>
                <input type="email" id="login-email" required placeholder="name@apexdental.com"
                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-colors">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Security
                    Password</label>
                <input type="password" id="login-password" required placeholder="••••••••"
                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-colors">
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm py-3.5 rounded-xl shadow-lg transition-all transform active:scale-[0.98] mt-2">
                Initialize Session
            </button>
        </form>

        <div class="border-t border-slate-800/60 pt-4 text-center">
            <a href="/index.html" class="text-xs text-slate-500 hover:text-slate-400 transition-colors">◀ Return to Main
                Consumer Portal</a>
        </div>
        <div>
            <p class="text-xs text-center">Dont have account yet? <a href="clinicRegistration.html"
                    class="text-xs text-slate-100 hover:text underline">Register your clinic
                    here..</a>
            </p>
        </div>
    </div>

    <script src="/src/pages/clinicLogin.js"></script>
</body>

</html>
