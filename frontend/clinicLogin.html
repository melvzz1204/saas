<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Workspace Gateway | SaaS Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth scale-up and fade-in transitions for modal entry popping */
        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(8px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-modal-pop {
            animation: modalPop 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body
    class="bg-slate-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden">

    <!-- Ambient Grid and Tech Glow Background Layouts -->
    <div
        class="absolute inset-0 bg-[linear-gradient(to_right,#0f172a_1px,transparent_1px),linear-gradient(to_bottom,#0f172a_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_40%,#000_70%,transparent_100%)]">
    </div>
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[450px] h-[450px] rounded-full bg-indigo-500/10 blur-[100px] pointer-events-none">
    </div>

    <!-- ==========================================
         BASE WORKSPACE CARD: CLINIC LOGIN
         ========================================== -->
    <div
        class="max-w-md w-full bg-slate-900/80 backdrop-blur-md border border-slate-800 rounded-2xl shadow-2xl p-8 space-y-6 relative z-10">

        <!-- Top Laser Trim Accent Line -->
        <div
            class="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-[2px] bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500 rounded-full">
        </div>

        <!-- Header Identity Block -->
        <div class="text-center space-y-3">
            <div
                class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600/10 text-indigo-400 border border-indigo-500/20 rounded-xl text-xl font-bold shadow-inner transform hover:rotate-12 transition-transform duration-300">
                🦷
            </div>
            <div class="space-y-1">
                <h2 class="text-xl font-black text-white tracking-tight uppercase">Clinic Control Center</h2>
                <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Authorized Provider Gateway
                </p>
            </div>
        </div>

        <!-- Programmatic Security Error Box Alert Banner -->
        <div id="error-box"
            class="hidden p-3.5 rounded-xl text-xs font-bold text-center bg-rose-500/10 border border-rose-500/20 text-rose-400 tracking-wide">
        </div>

        <!-- B2B Enterprise Form Entry Node -->
        <form id="business-login-form" class="space-y-4">
            <!-- Email Input -->
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Workspace
                    Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke-width="2.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                        </svg>
                    </div>
                    <input type="email" id="login-email" required placeholder="name@apexdental.com"
                        class="w-full bg-slate-950/80 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30 transition-all font-medium">
                </div>
            </div>

            <!-- Password Input -->
            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Security
                        Password</label>
                    <a href="#"
                        class="text-[10px] text-indigo-400 hover:text-indigo-300 font-bold hover:underline transition-colors">Recovery
                        Keys?</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke-width="2.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                        </svg>
                    </div>
                    <input type="password" id="login-password" required placeholder="••••••••"
                        class="w-full bg-slate-950/80 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30 transition-all">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 text-white font-bold text-xs py-3.5 rounded-xl shadow-lg shadow-indigo-950/50 transition-all transform active:scale-[0.99] tracking-wider uppercase mt-2 cursor-pointer">
                Log in
            </button>
        </form>

        <!-- Structured Footer Router Anchors -->
        <div class="border-t border-slate-800/60 pt-5 space-y-3">
            <div class="text-center">
                <p class="text-xs text-slate-400">
                    New practice node?
                    <!-- 🎯 MODAL TOGGLE BUTTON -->
                    <button type="button" id="open-register-modal-btn"
                        class="text-indigo-400 font-bold hover:text-indigo-300 hover:underline ml-0.5 transition-colors cursor-pointer bg-transparent border-none outline-none">
                        Register your clinic here
                    </button>
                </p>
            </div>
            <div class="text-center">
                <a href="/index.html"
                    class="inline-flex items-center text-[10px] text-slate-500 hover:text-slate-400 font-semibold tracking-wide uppercase transition-colors group">
                    <svg class="w-3 h-3 mr-1 transform group-hover:-translate-x-0.5 transition-transform" fill="none"
                        stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                    </svg>
                    Return to Main Consumer Portal
                </a>
            </div>
        </div>
    </div>


    <!-- ==========================================
         🎯 DYNAMIC OVERLAY MODAL: CLINIC WORKSPACE REGISTRATION
         ========================================== -->
    <div id="clinic-register-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/85 backdrop-blur-sm transition-all duration-300">

        <!-- Modal Container Framework -->
        <div
            class="max-w-xl w-full bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-6 md:p-8 space-y-6 relative animate-modal-pop max-h-[95vh] overflow-y-auto">

            <!-- Top Gradient Highlight Strip Accent -->
            <div
                class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-[2px] bg-gradient-to-r from-emerald-500 via-teal-500 to-indigo-500 rounded-full">
            </div>

            <!-- Absolute Modal Dismiss Button Icon -->
            <button type="button" id="close-register-modal-btn"
                class="absolute top-4 right-4 text-slate-400 hover:text-white p-1.5 rounded-lg hover:bg-slate-800/60 transition-all cursor-pointer">
                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Title & Branding Blocks -->
            <div class="text-center space-y-2">
                <div
                    class="inline-flex items-center justify-center w-11 h-11 bg-emerald-600/10 text-emerald-400 border border-emerald-500/20 rounded-xl text-lg font-black shadow-md">
                    🏢</div>
                <h2 class="text-xl font-black text-white tracking-tight uppercase">Register New Clinic</h2>
                <p class="text-xs text-slate-400">Deploy a dedicated, isolated tenant workspace instance</p>
            </div>

            <!-- Programmatic Notification Banner Block -->
            <div id="notification-box" class="hidden text-xs p-3.5 rounded-xl font-bold border text-center"></div>

            <!-- Two-Part Chunked Onboarding Form Grid Structure -->
            <form id="clinic-registration-form" class="space-y-5">

                <!-- Sub-Section 1: Clinic Metadata Properties -->
                <div class="space-y-3.5">
                    <h3
                        class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest border-b border-slate-800/60 pb-1.5">
                        1. Workspace Profile
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label
                                class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Clinic
                                Name</label>
                            <input type="text" id="clinic-name" required placeholder="Apex Dental Care"
                                class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-emerald-500 transition-colors">
                        </div>

                        <div>
                            <label
                                class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Desired
                                URL Slug</label>
                            <input type="text" id="clinic-slug" required placeholder="apexdental"
                                class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-emerald-500 transition-colors lowercase">
                        </div>
                    </div>
                    <!--
                    <div
                        class="text-[10px] text-slate-500 leading-relaxed bg-slate-950/40 p-2 rounded-xl border border-slate-800/50">
                        <span class="font-bold text-slate-400">Patient Entry Terminal Endpoint:</span>
                        <span class="text-slate-400 font-mono block mt-0.5 truncate select-all">
                            /patientLogin.html?clinic=<span id="slug-preview"
                                class="text-emerald-400 font-bold">...</span>
                        </span>
                    </div> -->
                </div>

                <!-- Sub-Section 2: Primary Administrator Account Configuration -->
                <div class="space-y-3.5">
                    <h3
                        class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest border-b border-slate-800/60 pb-1.5">
                        2. Primary Administrator Account
                    </h3>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label
                                class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">First
                                Name</label>
                            <input type="text" id="admin-firstname" required placeholder="e.g. Clinic"
                                class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-emerald-500 transition-colors">
                        </div>

                        <div>
                            <label
                                class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Last
                                Name</label>
                            <input type="text" id="admin-lastname" required placeholder="e.g. Admin"
                                class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-emerald-500 transition-colors">
                        </div>

                        <div>
                            <label
                                class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Workspace
                                Email</label>
                            <input type="email" id="admin-email" required placeholder="admin@apexdental.com"
                                class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-emerald-500 transition-colors">
                        </div>

                        <div>
                            <label
                                class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Phone
                                Number</label>
                            <input type="tel" id="admin-phone" required placeholder="555-0199"
                                class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-emerald-500 transition-colors">
                        </div>
                    </div>

                    <div class="pt-1">
                        <label
                            class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Security
                            Password</label>
                        <input type="password" id="admin-password" required placeholder="••••••••"
                            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-emerald-500 transition-colors">
                    </div>
                </div>

                <!-- Provision Workflow Submission Trigger Button -->
                <button type="submit"
                    class="w-full bg-gradient-to-r from-emerald-600 to-emerald-700 hover:from-emerald-500 hover:to-emerald-600 text-white font-bold text-xs py-3.5 rounded-xl shadow-lg shadow-emerald-950/40 transition-all uppercase tracking-wider mt-2 cursor-pointer">
                    Register clinic
                </button>
            </form>
        </div>
    </div>

    <!-- ==========================================
         ⚙️ JAVASCRIPT MODAL SECTOR HUB CONTROLLER
         ========================================== -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const registerModal = document.getElementById("clinic-register-modal");
            const openModalBtn = document.getElementById("open-register-modal-btn");
            const closeModalBtn = document.getElementById("close-register-modal-btn");

            // Open Modal Anchor Handler
            if (openModalBtn && registerModal) {
                openModalBtn.addEventListener("click", () => {
                    registerModal.classList.remove("hidden");
                    document.body.classList.add("overflow-hidden"); // Lock body scrolling
                });
            }

            // Close Modal Anchor Handler
            if (closeModalBtn && registerModal) {
                closeModalBtn.addEventListener("click", () => {
                    registerModal.classList.add("hidden");
                    document.body.classList.remove("overflow-hidden");
                });
            }

            // Backdrop Intercept Layer Cancellation Click Handler
            if (registerModal) {
                registerModal.addEventListener("click", (e) => {
                    if (e.target === registerModal) {
                        registerModal.classList.add("hidden");
                        document.body.classList.remove("overflow-hidden");
                    }
                });
            }
        });
    </script>

    <!-- Core Analytical Logic Module Wireups -->
    <script src="/src/pages/clinicLogin.js"></script>
    <script src="/src/pages/clinicRegistration.js"></script>
</body>

</html>
