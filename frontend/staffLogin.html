<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Terminal Access | Clinic Flow SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="bg-slate-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Background Tech Grid Accents -->
    <div
        class="absolute inset-0 bg-[linear-gradient(to_right,#0f172a_1px,transparent_1px),linear-gradient(to_bottom,#0f172a_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_40%,#000_70%,transparent_100%)]">
    </div>
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[450px] h-[450px] rounded-full bg-blue-500/10 blur-[100px] pointer-events-none">
    </div>

    <div
        class="max-w-md w-full bg-slate-900/80 backdrop-blur-md border border-slate-800 rounded-2xl shadow-2xl p-8 space-y-6 relative z-10">
        <div
            class="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-[2px] bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full">
        </div>

        <div class="text-center space-y-3">
            <div
                class="inline-flex items-center justify-center w-12 h-12 bg-blue-600/10 text-blue-400 border border-blue-500/20 rounded-xl text-xl font-bold shadow-inner">
                🪪
            </div>
            <div class="space-y-1">
                <h2 class="text-xl font-black text-white tracking-tight uppercase">Staff Workspace</h2>
                <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Clinical Workflow Access
                    Node</p>
            </div>
        </div>

        <div id="error-box"
            class="hidden p-3.5 rounded-xl text-xs font-bold text-center bg-rose-500/10 border border-rose-500/20 text-rose-400 tracking-wide">
        </div>

        <form id="staff-login-form" class="space-y-4">
            <!-- Workspace Email -->
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Workspace
                    Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                        </svg>
                    </div>
                    <input type="email" id="staff-email" required placeholder="yourname@clinic.com"
                        class="w-full bg-slate-950/80 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition-all font-medium">
                </div>
            </div>

            <!-- 🔑 NO-PASSWORD SOLUTION: Secure Access PIN or Passcode -->
            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Assigned Access
                        PIN</label>
                    <span class="text-[9px] text-slate-500 font-medium">Provided by Administrator</span>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <!-- Using type="text" or "password" depending on if you want digits hidden -->
                    <input type="password" id="staff-pin" required placeholder="Enter terminal PIN code"
                        autocomplete="off"
                        class="w-full bg-slate-950/80 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-xs text-white placeholder-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition-all font-mono tracking-widest">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold text-xs py-3.5 rounded-xl shadow-lg transition-all transform active:scale-[0.99] tracking-wider uppercase mt-2 cursor-pointer">
                Enter Duty Station
            </button>
        </form>

        <div class="border-t border-slate-800/60 pt-4 text-center">
            <a href="/index.html"
                class="text-[10px] text-slate-500 hover:text-slate-400 font-bold tracking-wide uppercase transition-colors">
                ◀ Main Consumer Portal
            </a>
        </div>
    </div>

    <script type="module" src="/src/pages/staffLogin.js"></script>
</body>

</html>
