<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Portal - Login</title>
    <link rel="stylesheet" href="/src/assets/main.css">
</head>

<body>

    <div class="login-container">
        <h2>🦷 Dental Clinic Portal</h2>
        <p>Please log in to manage your appointments</p>

        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" required placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>

            <button type="submit" id="login-btn">Log In</button>
        </form>

        <p class="switch-form">Don't have an account? <a href="/register.html">Register here</a></p>
    </div>

    <script type="module" src="/src/pages/patientLogin.js"></script>
</body>

</html>
