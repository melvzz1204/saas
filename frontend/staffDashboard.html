<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Duty Terminal | Clinic Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-50 text-slate-800 font-sans min-h-screen antialiased flex flex-col">

    <nav class="bg-white border-b border-slate-200/80 sticky top-0 z-50 shadow-xs">
        <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <div
                        class="w-9 h-9 bg-blue-50 text-blue-600 border border-blue-100 rounded-xl flex items-center justify-center text-sm font-black shadow-xs">
                        🩺</div>
                    <div class="flex flex-col">
                        <span id="clinic-branch-title" class="font-bold text-sm tracking-tight text-slate-900">Loading
                            Workspace...</span>
                        <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest -mt-0.5">Live
                            Operations Flow</span>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div
                        class="flex items-center space-x-2 bg-slate-100 border border-slate-200/40 px-3 py-1.5 rounded-xl">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                        <span id="staff-name-badge" class="text-xs font-bold text-slate-700">Loading Duty
                            Staff...</span>
                    </div>
                    <button id="staff-logout-btn"
                        class="px-3.5 py-1.5 bg-slate-100 hover:bg-rose-50 hover:text-rose-600 text-slate-600 text-xs font-bold rounded-xl transition-all cursor-pointer border border-slate-200/40">
                        Exit Shift
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6 flex-1 w-full">

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold uppercase text-slate-400 tracking-wider">Lobby Queue</p>
                    <h3 id="stat-remaining" class="text-xl font-black text-slate-900">0 Waiting</h3>
                </div>
                <div class="p-3 bg-amber-50 text-amber-600 rounded-xl text-xl font-bold">🛋️</div>
            </div>
            <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold uppercase text-slate-400 tracking-wider">Active Operations</p>
                    <h3 id="stat-active-chair" class="text-xl font-black text-slate-900">0 In Chair</h3>
                </div>
                <div class="p-3 bg-blue-50 text-blue-600 rounded-xl text-xl font-bold">🪑</div>
            </div>
            <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold uppercase text-slate-400 tracking-wider">Completed Today</p>
                    <h3 id="stat-completed" class="text-xl font-black text-slate-900">0 Sessions</h3>
                </div>
                <div class="p-3 bg-emerald-50 text-emerald-600 rounded-xl text-xl font-bold">✅</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full items-start">

            <div class="bg-slate-100/50 border border-slate-200 rounded-2xl p-4 flex flex-col h-[650px]">
                <div class="flex items-center justify-between mb-4 px-1">
                    <h3 class="text-sm font-black text-slate-800 uppercase tracking-wider flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-amber-500"></span> Lobby / Waiting
                    </h3>
                    <span id="count-waiting"
                        class="bg-amber-100 text-amber-700 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="col-waiting" class="flex-1 overflow-y-auto space-y-3 pr-1 scrollbar-hide">
                </div>
            </div>

            <div class="bg-blue-50/30 border border-blue-100 rounded-2xl p-4 flex flex-col h-[650px]">
                <div class="flex items-center justify-between mb-4 px-1">
                    <h3 class="text-sm font-black text-blue-900 uppercase tracking-wider flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span> In Treatment
                    </h3>
                    <span id="count-treatment"
                        class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="col-treatment" class="flex-1 overflow-y-auto space-y-3 pr-1 scrollbar-hide">
                </div>
            </div>

            <div class="bg-emerald-50/30 border border-emerald-100 rounded-2xl p-4 flex flex-col h-[650px]">
                <div class="flex items-center justify-between mb-4 px-1">
                    <h3 class="text-sm font-black text-emerald-900 uppercase tracking-wider flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Checked Out
                    </h3>
                    <span id="count-completed"
                        class="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="col-completed" class="flex-1 overflow-y-auto space-y-3 pr-1 scrollbar-hide">
                </div>
            </div>

        </div>
    </main>

    <script>
        (function () {
            const role = localStorage.getItem("userRole");
            if (!localStorage.getItem("token") || role !== "staff") {
                window.location.replace("/staffLogin.html");
            }
        })();
    </script>
    <script type="module" src="/src/pages/staffDashboard.js"></script>
</body>

</html>
